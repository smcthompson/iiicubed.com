trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

pool:
  name: Default
  demands:
    - Agent.Name -equals Tydirium

variables:
  NODE_VERSION: '22.x'

steps:
  - task: NodeTool@0
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: Lint and build

  - script: |
      set -euo pipefail
      node dist/server.js &
      SERVER_PID=$!
      trap 'kill "$SERVER_PID"' EXIT

      # Wait up to 30s for server startup and fail fast if process exits.
      for i in $(seq 1 30); do
        if ! kill -0 "$SERVER_PID" 2>/dev/null; then
          echo "Server process exited before readiness check."
          exit 1
        fi

        if curl --fail --silent --show-error http://localhost:3000/ > /dev/null; then
          exit 0
        fi

        sleep 1
      done

      echo "Server did not become ready within 30 seconds."
      exit 1
    displayName: Runtime smoke test (built artifact)
