trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

pool:
  name: Default
  demands:
    - Agent.Name -equals Tydirium

variables:
  NODE_VERSION: '26.x'
  PORT: '3000'

steps:
  - task: UseNode@1
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      version: $(NODE_VERSION)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: 'Lint and Build'

  - script: npm run test:ci
    displayName: 'Playwright E2E Tests'
    env:
      CI: 'true'
      PORT: '3000'
      NODE_ENV: 'production'

  - task: PublishTestResults@2
    displayName: Publish Test Results
    condition: always()
    inputs:
      testResultsFormat: JUnit
      testResultsFiles: test-results/playwright-junit.xml
      failTaskOnFailedTests: true
      testRunTitle: Playwright E2E

  - task: PublishPipelineArtifact@1
    displayName: Publish Test Report
    condition: always()
    inputs:
      targetPath: 'playwright-report'
      artifact: 'Playwright-Test-Report'
      publishLocation: 'pipeline'

  - task: PublishPipelineArtifact@1
    displayName: Publish Test Artifacts
    condition: always()
    inputs:
      targetPath: 'test-results'
      artifact: 'Playwright-Test-Artifacts'
      publishLocation: 'pipeline'
