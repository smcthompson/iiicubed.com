trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

pool:
  name: Default
  demands:
    - Agent.Name -equals Tydirium

variables:
  NODE_VERSION: '26.x'
  PORT: '3000'

steps:
  - task: UseNode@1
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      version: $(NODE_VERSION)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: Lint and build

  - script: |
      set -euo pipefail

      LOG_FILE="server.log"
      > "$LOG_FILE"

      echo "Starting server in background..."
      NODE_ENV=production PORT="$(PORT)" npm run start:ci > "$LOG_FILE" 2>&1 &
      SERVER_PID=$!
      trap 'kill $SERVER_PID 2>/dev/null || true; cat "$LOG_FILE"' EXIT

      echo "Waiting for 'Server is running' message..."

      READY=0
      for i in $(seq 1 60); do
        if ! kill -0 "$SERVER_PID" 2>/dev/null; then
          echo "Server process exited before readiness check."
          tail -n 50 "$LOG_FILE"
          exit 1
        fi

        if grep -q "Server is running on http://localhost:$(PORT)" "$LOG_FILE"; then
          READY=1
          break
        fi

        sleep 1
      done

      if [ "$READY" -ne 1 ]; then
        echo "Timeout waiting for ready message"
        tail -n 50 "$LOG_FILE"
        exit 1
      fi

      echo "Server ready message detected"

        echo "Health check passed with curl"
        tail -n 15 "$LOG_FILE"
        exit 0
      else
      if ! curl --fail --silent --show-error --max-time 5 "http://localhost:$(PORT)/" > /dev/null; then
        echo "Ready message found but curl check failed"
        tail -n 30 "$LOG_FILE"
        exit 1
      fi
      PORT="$(PORT)" npm test || TEST_EXIT=$?

    displayName: Runtime smoke test (built artifact)
    workingDirectory: $(System.DefaultWorkingDirectory)

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'server.log'
      artifact: 'SmokeTest-Logs'
      publishLocation: 'pipeline'
    displayName: 'Publish smoke test log'
    condition: always() # Publish even if the step fails
