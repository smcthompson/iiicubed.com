trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

pool:
  name: Default
  demands:
    - Agent.Name -equals Tydirium

variables:
  NODE_VERSION: '26.x'

steps:
  - task: NodeTool@0
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: Lint and build

  - script: |
      set -euo pipefail

      echo "Starting server in background..."
      node dist/server.js > server.log 2>&1 &
      SERVER_PID=$!
      trap 'kill $SERVER_PID 2>/dev/null || true' EXIT

      echo "Waiting for server to be ready on http://localhost:3000 ..."

      # More patient readiness check (up to 60 seconds)
      for i in $(seq 1 60); do
        if ! kill -0 "$SERVER_PID" 2>/dev/null; then
          echo "❌ Server process exited unexpectedly."
          cat server.log
          exit 1
        fi

        if curl --fail --silent --show-error --max-time 2 http://localhost:3000/ > /dev/null; then
          echo "✅ Server is ready!"
          # Optional: show a bit of the log
          tail -n 20 server.log
          exit 0
        fi

        sleep 1
      done

      echo "❌ Server did not become ready within 60 seconds."
      echo "=== Last 30 lines of server log ==="
      tail -n 30 server.log
      exit 1
    displayName: Runtime smoke test (built artifact)
    workingDirectory: $(System.DefaultWorkingDirectory)   # Make sure you're in the right folder
