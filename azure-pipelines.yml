trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

pool:
  name: Default
  demands:
    - Agent.Name -equals Tydirium

variables:
  NODE_VERSION: '26.x'

steps:
  - task: NodeTool@0
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: npm ci
    displayName: Install dependencies

  - script: npm run build
    displayName: Lint and build

  - script: |
      set -euo pipefail

      LOG_FILE="server.log"
      > "$LOG_FILE"   # Clear log file

      echo "Starting server in background..."
      node dist/server.js > "$LOG_FILE" 2>&1 &
      SERVER_PID=$!
      trap 'kill $SERVER_PID 2>/dev/null || true; cat "$LOG_FILE"' EXIT

      echo "Waiting for 'Server is running' message..."

      # Wait up to 60 seconds for the ready message
      if timeout 60s tail -f -n0 "$LOG_FILE" | grep -q "Server is running on http://localhost:3000"; then
        echo "✅ Server ready message detected!"
        
        # Optional: Give it 2 extra seconds to fully settle
        sleep 2
        
        # Final health check
        if curl --fail --silent --show-error --max-time 5 http://localhost:3000/ > /dev/null; then
          echo "✅ Health check passed with curl"
          tail -n 15 "$LOG_FILE"
          exit 0
        else
          echo "⚠️ Ready message found but curl check failed"
          tail -n 30 "$LOG_FILE"
          exit 1
        fi
      else
        echo "❌ Timeout waiting for ready message"
        tail -n 50 "$LOG_FILE"
        exit 1
      fi
    displayName: Runtime smoke test (built artifact)
    workingDirectory: $(System.DefaultWorkingDirectory)
